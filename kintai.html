<html lang="ja">
<head>

  <!-- styles.css -->
  <style>
/*
 * styles.css - 共通スタイル
 *
 * 役割:
 *   カラー変数・レイアウト・共通コンポーネントを定義する。
 *   各アプリ固有スタイルより先に読み込む。
 *
 * デザイン方針:
 *   - OS / ブラウザのライト・ダークモード設定に自動追従する
 *   - color-scheme と prefers-color-scheme で切り替え
 *   - アクセントカラーは accent-color: auto でブラウザ規定値を使用
 *   - フォントはシステムフォントスタック（インストール不要）
 *
 * クラス命名規則:
 *   すべてのクラスに sumioka- プレフィックスを付けて他ライブラリと衝突しない
 *
 * @version 1.0.0
 * @author  田中沙亜
 */

/* ============================================================
   リセット・ベース
   ============================================================ */

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* OS のライト/ダークに自動追従 */
:root {
  color-scheme: light dark;
}

html {
  /* システムフォントスタック（Windows / Mac / Linux / Android / iOS 対応） */
  font-family:
    'Hiragino Sans',        /* Mac / iOS */
    'Hiragino Kaku Gothic ProN',
    'Noto Sans JP',         /* Android / Linux */
    'Yu Gothic UI',         /* Windows 10+ */
    'Meiryo UI',            /* Windows 旧 */
    sans-serif;
  font-size: 16px;
  line-height: 1.6;
  /* ブラウザ規定のカラースキームに委ねる */
  color: CanvasText;
  background-color: Canvas;
}

body {
  min-height: 100dvh;
  margin: 0;
  background: #f5f5f5;
}

#screen-login,
#screen-main {
  width: 100%;
  max-width: 480px;
  margin: 40px auto; /* ←中央寄せはこれでOK */
  padding: 20px;
  box-sizing: border-box;
}
    
a {
  color: LinkText;
}

button,
input,
select,
textarea {
  font: inherit;
  color: inherit;
  accent-color: auto; /* ブラウザ規定のアクセントカラーを使用 */
}

img {
  max-width: 100%;
  display: block;
}

/* ============================================================
   レイアウト
   ============================================================ */

.sumioka-container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 0 1rem;
}

.sumioka-section {
  margin-bottom: 1.5rem;
}

/* ============================================================
   タイポグラフィ
   ============================================================ */

h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
h2 { font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem; }
h3 { font-size: 1.1rem;  font-weight: bold; margin-bottom: 0.25rem; }

p { margin-bottom: 0.75rem; }
p:last-child { margin-bottom: 0; }

/* ============================================================
   ボタン
   ============================================================ */

.sumioka-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.25rem;
  padding: 0.5rem 1.25rem;
  border: 1px solid ButtonBorder;
  border-radius: 4px;
  background-color: ButtonFace;
  color: ButtonText;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  text-decoration: none;
  transition: opacity 0.15s;
  white-space: nowrap;
  user-select: none;
}

.sumioka-btn:hover:not(:disabled) {
  opacity: 0.8;
}

.sumioka-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* primary: ブラウザのアクセントカラーを使用 */
.sumioka-btn-primary {
  background-color: Highlight;
  color: HighlightText;
  border-color: Highlight;
}

/* secondary: 通常ボタン */
.sumioka-btn-secondary {
  background-color: ButtonFace;
  color: ButtonText;
}

/* danger: 削除・警告用 */
.sumioka-btn-danger {
  background-color: #c0392b;
  color: #fff;
  border-color: #c0392b;
}

/* ブロック幅 */
.sumioka-btn-block {
  display: flex;
  width: 100%;
}

/* ボタングループ */
.sumioka-btn-group {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

/* ============================================================
   フォーム
   ============================================================ */

.sumioka-form-group {
  margin-bottom: 1rem;
}

.sumioka-label {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
}

.sumioka-input,
.sumioka-select,
.sumioka-textarea {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid GrayText;
  border-radius: 4px;
  background-color: Field;
  color: FieldText;
  font-size: 1rem;
  line-height: 1.5;
  transition: border-color 0.15s;
}

.sumioka-input:focus,
.sumioka-select:focus,
.sumioka-textarea:focus {
  outline: 2px solid Highlight;
  outline-offset: 0;
  border-color: Highlight;
}

.sumioka-textarea {
  resize: vertical;
  min-height: 80px;
}

.sumioka-input-hint {
  font-size: 0.8rem;
  color: GrayText;
  margin-top: 0.2rem;
}

/* ============================================================
   カード
   ============================================================ */

.sumioka-card {
  border: 1px solid GrayText;
  border-radius: 6px;
  padding: 1rem;
  margin-bottom: 1rem;
  background-color: Canvas;
}

.sumioka-card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid GrayText;
}

/* ============================================================
   テーブル
   ============================================================ */

.sumioka-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.sumioka-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

.sumioka-table th,
.sumioka-table td {
  padding: 0.5rem 0.75rem;
  text-align: left;
  border-bottom: 1px solid GrayText;
}

.sumioka-table th {
  font-weight: 600;
  background-color: ButtonFace;
}

.sumioka-table tbody tr:hover {
  background-color: ButtonFace;
}

/* ============================================================
   タブナビゲーション
   ============================================================ */

.sumioka-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid GrayText;
  margin-bottom: 1rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.sumioka-tabs::-webkit-scrollbar {
  display: none;
}

.sumioka-tab-btn {
  flex-shrink: 0;
  padding: 0.5rem 1rem;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  color: GrayText;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: -2px;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}

.sumioka-tab-btn:hover {
  color: CanvasText;
}

.sumioka-tab-btn--active {
  color: Highlight;
  border-bottom-color: Highlight;
  font-weight: 700;
}

.sumioka-tab-content {
  /* hidden 属性で表示・非表示を切り替える（JS 側で hidden を操作） */
}

.sumioka-tab-content[hidden] {
  display: none;
}

/* ============================================================
   トースト通知
   ============================================================ */

.sumioka-toast-ov {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9000;
  pointer-events: none;
}

.sumioka-toast-box {
  padding: 0.65rem 1.25rem;
  border-radius: 4px;
  font-size: 0.95rem;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: auto;
  border: 1px solid transparent;
}

.sumioka-toast-show {
  opacity: 1;
  transform: translateY(0);
}

.sumioka-toast-hide {
  opacity: 0;
  transform: translateY(8px);
}

/* ライト/ダーク両対応のトーストカラー */
.sumioka-toast-success {
  background-color: #1a7f37;
  color: #fff;
  border-color: #1a7f37;
}

.sumioka-toast-error {
  background-color: #c0392b;
  color: #fff;
  border-color: #c0392b;
}

.sumioka-toast-warning {
  background-color: #b45309;
  color: #fff;
  border-color: #b45309;
}

.sumioka-toast-info {
  background-color: ButtonFace;
  color: CanvasText;
  border-color: GrayText;
}

/* ============================================================
   ローディングオーバーレイ
   ============================================================ */

.sumioka-loading-overlay {
  position: fixed;
  inset: 0;
  background-color: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9100;
}

.sumioka-loading-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  background-color: Canvas;
  border: 1px solid GrayText;
  border-radius: 8px;
  padding: 2rem 2.5rem;
}

.sumioka-loading-spinner {
  width: 2rem;
  height: 2rem;
  border: 3px solid GrayText;
  border-top-color: Highlight;
  border-radius: 50%;
  animation: sumioka-spin 0.7s linear infinite;
}

@keyframes sumioka-spin {
  to { transform: rotate(360deg); }
}

.sumioka-loading-text {
  font-size: 0.95rem;
  color: GrayText;
}

/* ============================================================
   エラーダイアログ
   ============================================================ */

.sumioka-error-overlay {
  position: fixed;
  inset: 0;
  background-color: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9200;
  padding: 1rem;
}

.sumioka-error-box {
  background-color: Canvas;
  border: 1px solid GrayText;
  border-radius: 8px;
  padding: 1.5rem;
  max-width: 480px;
  width: 100%;
}

.sumioka-error-message {
  font-weight: 600;
  margin-bottom: 1rem;
}

.sumioka-error-detail {
  font-size: 0.8rem;
  color: GrayText;
  margin-bottom: 1rem;
}

.sumioka-error-detail pre {
  margin-top: 0.5rem;
  white-space: pre-wrap;
  word-break: break-all;
}

.sumioka-error-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
}

/* ============================================================
   確認ダイアログ
   ============================================================ */

.sumioka-confirm-overlay {
  position: fixed;
  inset: 0;
  background-color: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9300;
  padding: 1rem;
}

.sumioka-confirm-box {
  background-color: Canvas;
  border: 1px solid GrayText;
  border-radius: 8px;
  padding: 1.5rem;
  max-width: 400px;
  width: 100%;
}

.sumioka-confirm-message {
  margin-bottom: 1.25rem;
  font-weight: 500;
}

.sumioka-confirm-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
}

/* ============================================================
   バッジ・ステータス
   ============================================================ */

.sumioka-badge {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
  border: 1px solid currentColor;
}

.sumioka-badge-success { color: #1a7f37; }
.sumioka-badge-error   { color: #c0392b; }
.sumioka-badge-warning { color: #b45309; }
.sumioka-badge-info    { color: GrayText; }

/* ============================================================
   ユーティリティ
   ============================================================ */

.sumioka-text-center { text-align: center; }
.sumioka-text-right  { text-align: right; }
.sumioka-text-muted  { color: GrayText; font-size: 0.9rem; }
.sumioka-mt-1 { margin-top: 0.5rem; }
.sumioka-mt-2 { margin-top: 1rem; }
.sumioka-mt-3 { margin-top: 1.5rem; }
.sumioka-mb-1 { margin-bottom: 0.5rem; }
.sumioka-mb-2 { margin-bottom: 1rem; }
.sumioka-mb-3 { margin-bottom: 1.5rem; }
.sumioka-hidden { display: none !important; }

/* ============================================================
   バージョン履歴（initAppMeta 用）
   ============================================================ */

.sumioka-version-date {
  font-size: 0.8rem;
  color: GrayText;
  margin-left: 0.5rem;
}

/* ============================================================
   レスポンシブ
   ============================================================ */

@media (max-width: 480px) {
  html {
    font-size: 15px;
  }

  .sumioka-btn {
    padding: 0.5rem 1rem;
  }

  .sumioka-tab-btn {
    padding: 0.5rem 0.75rem;
    font-size: 0.85rem;
  }
}

  <!-- api.js -->
  <script>
/**
 * api.js - GAS通信モジュール
 *
 * 役割:
 *   フロントエンドと GAS（Google Apps Script）の通信を担う。
 *   タイムアウト・エラー処理・ボタン無効化を自動で行う。
 *
 * 使い方:
 *   1. アプリ起動時に setGasUrl(url) を1回呼ぶ
 *   2. 以降は callGAS(action, data, options) だけ使えばOK
 *
 * グローバル公開:
 *   window.SumiokaAPI.callGAS / gasPost / setGasUrl
 *   window.callGAS / gasPost / setGasUrl（省略形）
 *
 * @version 1.0.0
 * @author  田中沙亜
 */

(function (global) {
  'use strict';

  // ============================================================
  // 定数
  // ============================================================

  /** デフォルトのタイムアウト秒数 */
  const DEFAULT_TIMEOUT_SEC = 10;

  /** GAS の app 識別子（全リクエストで固定） */
  const APP_ID = 'attendance';

  // ============================================================
  // 内部状態
  // ============================================================

  /** GAS デプロイ URL（setGasUrl で設定する） */
  let _gasUrl = '';

  // ============================================================
  // 公開関数
  // ============================================================

  /**
   * GAS デプロイ URL をセットする。
   * アプリ起動時に1回だけ呼ぶ。
   * window.SUMIOKA_GAS_URL にも同時に書き込む。
   *
   * @param {string} url - GAS ウェブアプリのデプロイ URL
   */
  function setGasUrl(url) {
    _gasUrl = url;
    global.SUMIOKA_GAS_URL = url;
  }

  /**
   * GAS にリクエストを送る主要関数。
   * 全アプリからこれだけ使えばOK。
   *
   * @param {string} action           - 操作名（例: 'save', 'load'）
   * @param {Object} [data={}]        - 送信データ
   * @param {Object} [options={}]     - オプション
   * @param {HTMLElement} [options.button]  - 通信中に無効化するボタン要素
   * @param {number}  [options.timeout]     - タイムアウト秒（省略時は10秒）
   * @param {number}  [options.retry=0]     - リトライ回数
   * @returns {Promise<{success: boolean, data?: Object, error_message?: string, error_detail?: string, error_code?: string}>}
   */
  async function callGAS(action, data = {}, options = {}) {
    const payload = { app: APP_ID, action, data };
    return gasPost(payload, options);
  }

  /**
   * 任意ペイロードを直接 POST する低レベル API。
   * 通常は callGAS を使う。GAS のルーティングを独自にしたい場合のみ使用。
   *
   * エラーコード一覧:
   *   GAS_URL_UNSET : URL 未設定
   *   TIMEOUT       : タイムアウト
   *   NETWORK       : ネットワーク接続不可
   *   HTTP_5XX      : GAS サーバーエラー
   *   GAS_ERROR     : GAS 側でエラーが返った
   *   UNKNOWN       : その他
   *
   * @param {Object} payload          - 送信ペイロード
   * @param {Object} [options={}]
   * @param {HTMLElement} [options.button]
   * @param {number}  [options.timeout]
   * @param {number}  [options.retry=0]
   * @returns {Promise<Object>}
   */
  async function gasPost(payload, options = {}) {
    // URL 未設定チェック
    if (!_gasUrl) {
      return _errorResult('GAS URL が設定されていません。', '', 'GAS_URL_UNSET');
    }

    const timeoutSec = options.timeout ?? DEFAULT_TIMEOUT_SEC;
    const retryCount = options.retry   ?? 0;
    const button     = options.button  ?? null;

    // ボタンを無効化
    if (button) _disableButton(button, true);

    let lastError;

    // リトライループ（retryCount=0 なら1回だけ実行）
    for (let attempt = 0; attempt <= retryCount; attempt++) {
      try {
        const result = await _fetchWithTimeout(_gasUrl, payload, timeoutSec);
        if (button) _disableButton(button, false);
        return result;
      } catch (err) {
        lastError = err;
        if (attempt < retryCount) {
          // リトライ前に少し待つ（指数バックオフ）
          await _sleep(500 * Math.pow(2, attempt));
        }
      }
    }

    // 全リトライ失敗
    if (button) _disableButton(button, false);
    return _parseError(lastError);
  }

  // ============================================================
  // 内部ユーティリティ
  // ============================================================

  /**
   * タイムアウト付きで GAS に POST する。
   *
   * GAS は CORS 制約があるため Content-Type を text/plain にする。
   * （application/json にすると preflight が走り GAS 側でエラーになる）
   *
   * @param {string} url
   * @param {Object} payload
   * @param {number} timeoutSec
   * @returns {Promise<Object>}
   */
  async function _fetchWithTimeout(url, payload, timeoutSec) {
    const controller = new AbortController();
    const timerId    = setTimeout(() => controller.abort(), timeoutSec * 1000);

    try {
      const response = await fetch(url, {
        method  : 'POST',
        // GAS の CORS 制約を通すため text/plain を使う
        headers : { 'Content-Type': 'text/plain' },
        body    : JSON.stringify(payload),
        signal  : controller.signal,
        // GAS はリダイレクトするため follow を指定
        redirect: 'follow',
      });

      clearTimeout(timerId);

      if (!response.ok) {
        const err  = new Error('HTTP error');
        err.code   = 'HTTP_5XX';
        err.detail = `status: ${response.status}`;
        throw err;
      }

      const json = await response.json();

      // GAS 側が { success: false } を返した場合
      if (!json.success) {
        const err    = new Error(json.error_message || 'GAS エラー');
        err.code     = 'GAS_ERROR';
        err.detail   = json.error_detail || '';
        err.gasError = json;
        throw err;
      }

      return { success: true, data: json.data };

    } catch (err) {
      clearTimeout(timerId);

      // AbortController によるタイムアウト
      if (err.name === 'AbortError') {
        const e  = new Error('タイムアウト');
        e.code   = 'TIMEOUT';
        e.detail = `${timeoutSec}秒以内に応答がありませんでした。`;
        throw e;
      }

      // fetch 自体が失敗（ネットワーク不可）
      if (err instanceof TypeError) {
        const e  = new Error('ネットワークエラー');
        e.code   = 'NETWORK';
        e.detail = err.message;
        throw e;
      }

      throw err;
    }
  }

  /**
   * エラーオブジェクトからエラーレスポンスを生成する。
   *
   * @param {Error} err
   * @returns {Object}
   */
  function _parseError(err) {
    return _errorResult(
      err.message   || '通信エラーが発生しました。',
      err.detail    || '',
      err.code      || 'UNKNOWN'
    );
  }

  /**
   * エラーレスポンスオブジェクトを生成する。
   *
   * @param {string} message
   * @param {string} detail
   * @param {string} code
   * @returns {Object}
   */
  function _errorResult(message, detail, code) {
    return {
      success       : false,
      error_message : message,
      error_detail  : detail,
      error_code    : code,
    };
  }

  /**
   * ボタンの有効・無効を切り替える。
   *
   * @param {HTMLElement} button
   * @param {boolean} disabled
   */
  function _disableButton(button, disabled) {
    if (button && button instanceof HTMLElement) {
      button.disabled = disabled;
    }
  }

  /**
   * 指定ミリ秒待つ。
   *
   * @param {number} ms
   * @returns {Promise<void>}
   */
  function _sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // ============================================================
  // グローバル公開
  // ============================================================

  const SumiokaAPI = { callGAS, gasPost, setGasUrl };

  global.SumiokaAPI = SumiokaAPI;

  // 省略形（直接呼べる）
  global.callGAS  = callGAS;
  global.gasPost  = gasPost;
  global.setGasUrl = setGasUrl;

})(window);

  </script>

  <script>
/**
 * ui.js - 共通UI表示モジュール
 *
 * 役割:
 *   トースト通知・ローディング・エラーダイアログ・確認ダイアログ・
 *   タブ切り替え・数値入力変換を提供する。
 *
 * 依存:
 *   styles.css（.toast-ov / .loading-overlay / .error-overlay / .confirm-overlay など）
 *
 * グローバル公開:
 *   window.SumiokaUI.showToast / showLoading / hideLoading / showError /
 *                   confirm / handleApiResult / initTabs / initNumericInputs /
 *                   convertNumericInput / initAppMeta
 *   window.XXX（省略形）
 *
 * @version 1.0.0
 * @author  田中沙亜
 */

(function (global) {
  'use strict';

  // ============================================================
  // トースト通知
  // ============================================================

  /**
   * 画面下部にフワっとトースト通知を表示する。
   *
   * @param {string} message           - 表示するメッセージ
   * @param {'success'|'error'|'info'|'warning'} [type='info'] - 種類
   * @param {number} [duration=2000]   - 表示ミリ秒
   */
  function showToast(message, type = 'info', duration = 2000) {
    // 既存のトーストがあれば削除
    const existing = document.querySelector('.sumioka-toast-ov');
    if (existing) existing.remove();

    const ov  = document.createElement('div');
    ov.className = 'sumioka-toast-ov';

    const box = document.createElement('div');
    box.className = `sumioka-toast-box sumioka-toast-${type}`;
    box.textContent = message;

    ov.appendChild(box);
    document.body.appendChild(ov);

    // アニメーション付きで表示
    requestAnimationFrame(() => {
      box.classList.add('sumioka-toast-show');
    });

    // 指定時間後にフェードアウトして削除
    setTimeout(() => {
      box.classList.remove('sumioka-toast-show');
      box.classList.add('sumioka-toast-hide');
      setTimeout(() => ov.remove(), 300);
    }, duration);
  }

  // ============================================================
  // ローディング
  // ============================================================

  /**
   * 全画面ローディングオーバーレイを表示する。
   * callGAS の前後に必ずペアで使う。
   *
   * @param {string} [message='処理中...'] - ローディング中のテキスト
   */
  function showLoading(message = '処理中...') {
    hideLoading(); // 二重表示防止

    const ov = document.createElement('div');
    ov.className = 'sumioka-loading-overlay';
    ov.id = 'sumioka-loading';

    ov.innerHTML = `
      <div class="sumioka-loading-box">
        <div class="sumioka-loading-spinner"></div>
        <div class="sumioka-loading-text">${_escapeHtml(message)}</div>
      </div>
    `;

    document.body.appendChild(ov);
  }

  /**
   * ローディングオーバーレイを非表示にする。
   */
  function hideLoading() {
    const el = document.getElementById('sumioka-loading');
    if (el) el.remove();
  }

  // ============================================================
  // エラーダイアログ
  // ============================================================

  /**
   * エラーダイアログを表示する。
   *
   * @param {string}   errorMessage      - ユーザー向けメッセージ（日本語）
   * @param {string}   [errorDetail='']  - デバッグ用詳細（折りたたみで表示）
   * @param {Function} [onRetry]         - 「再試行」ボタンのコールバック（省略時はボタン非表示）
   */
  function showError(errorMessage, errorDetail = '', onRetry = null) {
    // 既存のエラーダイアログがあれば閉じる
    const existing = document.querySelector('.sumioka-error-overlay');
    if (existing) existing.remove();

    const ov  = document.createElement('div');
    ov.className = 'sumioka-error-overlay';

    const detailHtml = errorDetail
      ? `<details class="sumioka-error-detail">
           <summary>詳細</summary>
           <pre>${_escapeHtml(errorDetail)}</pre>
         </details>`
      : '';

    const retryHtml = onRetry
      ? `<button class="sumioka-btn sumioka-btn-primary" id="sumioka-error-retry">再試行</button>`
      : '';

    ov.innerHTML = `
      <div class="sumioka-error-box">
        <p class="sumioka-error-message">${_escapeHtml(errorMessage)}</p>
        ${detailHtml}
        <div class="sumioka-error-actions">
          ${retryHtml}
          <button class="sumioka-btn sumioka-btn-secondary" id="sumioka-error-close">閉じる</button>
        </div>
      </div>
    `;

    document.body.appendChild(ov);

    document.getElementById('sumioka-error-close').addEventListener('click', () => ov.remove());

    if (onRetry) {
      document.getElementById('sumioka-error-retry').addEventListener('click', () => {
        ov.remove();
        onRetry();
      });
    }
  }

  // ============================================================
  // API結果ハンドラ
  // ============================================================

  /**
   * callGAS の返り値を渡すだけで成功/失敗を自動表示する便利関数。
   * 成功 → showToast、失敗 → showError を自動で呼ぶ。
   *
   * @param {Object}   result          - callGAS の返り値
   * @param {string}   [successMessage='完了しました。'] - 成功時のトーストメッセージ
   * @param {Function} [onRetry]       - 失敗時の再試行コールバック
   * @returns {boolean} 成功したか
   */
  function handleApiResult(result, successMessage = '完了しました。', onRetry = null) {
    if (result.success) {
      showToast(successMessage, 'success');
      return true;
    } else {
      showError(result.error_message, result.error_detail, onRetry);
      return false;
    }
  }

  // ============================================================
  // 確認ダイアログ
  // ============================================================

  /**
   * 確認ダイアログを表示する。Promise<boolean> を返す。
   *
   * 使い方:
   *   const ok = await confirm('削除しますか？');
   *   if (ok) { ... }
   *
   * @param {string} [message='確認してください。']
   * @param {string} [confirmText='OK']
   * @param {string} [cancelText='キャンセル']
   * @returns {Promise<boolean>}
   */
  function confirm(message = '確認してください。', confirmText = 'OK', cancelText = 'キャンセル') {
    return new Promise(resolve => {
      const existing = document.querySelector('.sumioka-confirm-overlay');
      if (existing) existing.remove();

      const ov = document.createElement('div');
      ov.className = 'sumioka-confirm-overlay';

      ov.innerHTML = `
        <div class="sumioka-confirm-box">
          <p class="sumioka-confirm-message">${_escapeHtml(message)}</p>
          <div class="sumioka-confirm-actions">
            <button class="sumioka-btn sumioka-btn-primary"   id="sumioka-confirm-ok">${_escapeHtml(confirmText)}</button>
            <button class="sumioka-btn sumioka-btn-secondary" id="sumioka-confirm-cancel">${_escapeHtml(cancelText)}</button>
          </div>
        </div>
      `;

      document.body.appendChild(ov);

      document.getElementById('sumioka-confirm-ok').addEventListener('click', () => {
        ov.remove();
        resolve(true);
      });

      document.getElementById('sumioka-confirm-cancel').addEventListener('click', () => {
        ov.remove();
        resolve(false);
      });
    });
  }

  // ============================================================
  // タブ切り替え
  // ============================================================

  /**
   * タブナビゲーションを初期化する。
   *
   * HTML 条件:
   *   ボタンに class="sumioka-tab-btn" data-tab="タブ名"
   *   コンテンツに id="tab-タブ名"
   *
   * @param {Object}   [options={}]
   * @param {string}   [options.defaultTab]  - 初期表示タブ名（省略時は最初の .sumioka-tab-btn）
   * @param {Function} [options.onSwitch]    - タブ切り替え時コールバック (tabName) => {}
   */
  function initTabs(options = {}) {
    const buttons = Array.from(document.querySelectorAll('.sumioka-tab-btn'));
    if (buttons.length === 0) return;

    function switchTab(tabName) {
      buttons.forEach(btn => {
        const isActive = btn.dataset.tab === tabName;
        btn.classList.toggle('sumioka-tab-btn--active', isActive);
        btn.setAttribute('aria-selected', isActive);
      });

      document.querySelectorAll('.sumioka-tab-content').forEach(content => {
        content.hidden = content.id !== `tab-${tabName}`;
      });

      if (options.onSwitch) options.onSwitch(tabName);
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // 外部からタブを切り替えられるようにグローバルに公開
    global._sumiokaSwitch = switchTab;

    // 初期タブを表示
    const defaultTab = options.defaultTab || buttons[0].dataset.tab;
    switchTab(defaultTab);
  }

  // ============================================================
  // 数値ショートカット入力
  // ============================================================

  /**
   * data-convert 属性を持つ input を一括で数値ショートカット入力に設定する。
   * DOMContentLoaded 後に1回呼ぶだけでOK。
   *
   * data-convert の種類:
   *   "time"     : 830 → 8:30
   *   "duration" : 90  → 1:30
   *   "money"    : 9000 → 9,000
   */
  function initNumericInputs() {
    document.querySelectorAll('input[data-convert]').forEach(input => {
      convertNumericInput(input, input.dataset.convert);
    });
  }

  /**
   * 個別の input に数値ショートカットを設定する。
   *
   * @param {HTMLInputElement} inputEl
   * @param {'time'|'duration'|'money'} type
   */
  function convertNumericInput(inputEl, type) {
    inputEl.addEventListener('blur', () => {
      const raw = inputEl.value.replace(/[^0-9]/g, '');
      if (!raw) return;

      const num = parseInt(raw, 10);

      switch (type) {
        case 'time': {
          // 830 → 8:30 / 900 → 9:00
          const h = Math.floor(num / 100);
          const m = num % 100;
          if (m >= 60) return; // 不正な分は変換しない
          inputEl.value = `${h}:${String(m).padStart(2, '0')}`;
          break;
        }
        case 'duration': {
          // 90 → 1:30
          const h = Math.floor(num / 60);
          const m = num % 60;
          inputEl.value = `${h}:${String(m).padStart(2, '0')}`;
          break;
        }
        case 'money': {
          // 9000 → 9,000
          inputEl.value = num.toLocaleString('ja-JP');
          break;
        }
      }
    });
  }

  // ============================================================
  // アプリメタ情報
  // ============================================================

  /**
   * ヘッダーのバージョン表示と設定タブのバージョン履歴アコーディオンを生成する。
   *
   * HTML 条件:
   *   id="sumioka-app-version" : バージョン文字列を表示する要素
   *   id="sumioka-acc-versions": バージョン履歴アコーディオンを挿入する要素
   *
   * @param {Object}   options
   * @param {string}   options.version - 現在のバージョン（例: 'v1.0.0'）
   * @param {Array}    options.history - [{ v, date, note }] の配列（新しい順）
   */
  function initAppMeta({ version, history = [] }) {
    const versionEl = document.getElementById('sumioka-app-version');
    if (versionEl) versionEl.textContent = version;

    const accEl = document.getElementById('sumioka-acc-versions');
    if (accEl && history.length > 0) {
      accEl.innerHTML = history.map(h => `
        <details>
          <summary>${_escapeHtml(h.v)} <span class="sumioka-version-date">${_escapeHtml(h.date)}</span></summary>
          <p>${_escapeHtml(h.note)}</p>
        </details>
      `).join('');
    }
  }

  // ============================================================
  // 内部ユーティリティ
  // ============================================================

  /**
   * HTML エスケープ。XSS を防ぐため、ユーザー入力を DOM に埋め込む前に必ず使う。
   *
   * @param {string} str
   * @returns {string}
   */
  function _escapeHtml(str) {
    return String(str)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;')
      .replace(/'/g,  '&#039;');
  }

  // ============================================================
  // グローバル公開
  // ============================================================

  const SumiokaUI = {
    showToast,
    showLoading,
    hideLoading,
    showError,
    handleApiResult,
    confirm,
    initTabs,
    initNumericInputs,
    convertNumericInput,
    initAppMeta,
  };

  global.SumiokaUI = SumiokaUI;

  // 省略形（直接呼べる）
  global.showToast       = showToast;
  global.showLoading     = showLoading;
  global.hideLoading     = hideLoading;
  global.showError       = showError;
  global.handleApiResult = handleApiResult;
  global.confirm         = confirm;
  global.initTabs        = initTabs;
  global.initNumericInputs   = initNumericInputs;
  global.convertNumericInput = convertNumericInput;
  global.initAppMeta     = initAppMeta;

})(window);

  </script>

  <script>
/**
 * storage.js - localStorage 管理モジュール
 *
 * 役割:
 *   localStorage への保存・読込を一元管理する。
 *   キーに sumioka_ プレフィックスを自動付与し、他アプリとの衝突を防ぐ。
 *   データにはバージョン情報を付与する（将来のマイグレーション対応）。
 *
 * キー命名規則:
 *   保存時: sumioka_ + 引数のキー名
 *   例: save('gas_url', ...) → localStorage の 'sumioka_gas_url' に保存
 *   呼び出し側は sumioka_ なしで渡せばOK
 *
 * グローバル公開:
 *   window.SumiokaStorage.save / load / remove / clear / exists / keys / getUsage
 *   window.XXX（省略形）
 *
 * @version 1.0.0
 * @author  田中沙亜
 */

(function (global) {
  'use strict';

  // ============================================================
  // 定数
  // ============================================================

  /** localStorage キーのプレフィックス */
  const PREFIX = 'sumioka_';

  /** データに付与するスキーマバージョン */
  const SCHEMA_VERSION = 1;

  // ============================================================
  // 公開関数
  // ============================================================

  /**
   * データを保存する。
   *
   * @param {string}  key                      - キー名（プレフィックスなしで渡す）
   * @param {*}       value                    - 保存する値（JSON シリアライズ可能なもの）
   * @param {Object}  [options={}]
   * @param {boolean} [options.withVersion=true] - バージョン情報を付与するか
   * @returns {boolean} 成功したか
   */
  function save(key, value, options = {}) {
    const withVersion = options.withVersion ?? true;

    try {
      const payload = withVersion
        ? { _v: SCHEMA_VERSION, value }
        : value;

      localStorage.setItem(_prefixed(key), JSON.stringify(payload));
      return true;

    } catch (err) {
      // 容量超過（QuotaExceededError）の場合もコンソールに警告を出して false を返す
      if (err.name === 'QuotaExceededError') {
        console.warn('[SumiokaStorage] localStorage 容量超過:', key);
      } else {
        console.error('[SumiokaStorage] save エラー:', key, err);
      }
      return false;
    }
  }

  /**
   * データを読み込む。
   * キーが存在しない場合は defaultValue を返す。
   * バージョン情報が付与されたデータは自動的に展開して value だけ返す。
   *
   * @param {string} key          - キー名（プレフィックスなしで渡す）
   * @param {*}      [defaultValue=null] - キーが存在しない場合の返り値
   * @returns {*}
   */
  function load(key, defaultValue = null) {
    try {
      const raw = localStorage.getItem(_prefixed(key));
      if (raw === null) return defaultValue;

      const parsed = JSON.parse(raw);

      // バージョン情報が付与されている場合は value を取り出す
      if (parsed && typeof parsed === 'object' && '_v' in parsed) {
        return parsed.value;
      }

      return parsed;

    } catch (err) {
      console.error('[SumiokaStorage] load エラー:', key, err);
      return defaultValue;
    }
  }

  /**
   * 指定キーのデータを削除する。
   *
   * @param {string} key
   * @returns {boolean} 成功したか
   */
  function remove(key) {
    try {
      localStorage.removeItem(_prefixed(key));
      return true;
    } catch (err) {
      console.error('[SumiokaStorage] remove エラー:', key, err);
      return false;
    }
  }

  /**
   * sumioka_ プレフィックスのキーをすべて削除する。
   * 他アプリのデータには触れない。
   *
   * @param {boolean} confirmed - true を渡さないと実行されない（誤操作防止）
   * @returns {boolean} 実行されたか
   */
  function clear(confirmed) {
    if (confirmed !== true) {
      console.warn('[SumiokaStorage] clear() は clear(true) として呼んでください。');
      return false;
    }

    try {
      keys().forEach(key => localStorage.removeItem(_prefixed(key)));
      return true;
    } catch (err) {
      console.error('[SumiokaStorage] clear エラー:', err);
      return false;
    }
  }

  /**
   * キーが存在するか確認する。
   *
   * @param {string} key
   * @returns {boolean}
   */
  function exists(key) {
    return localStorage.getItem(_prefixed(key)) !== null;
  }

  /**
   * 現在保存されている全キー一覧を返す（プレフィックスなし）。
   *
   * @returns {string[]}
   */
  function keys() {
    const result = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(PREFIX)) {
        result.push(k.slice(PREFIX.length));
      }
    }
    return result;
  }

  /**
   * sumioka_ プレフィックスのキーが使用している容量の概算を返す。
   *
   * @returns {{ used: number, usedKB: string }}
   */
  function getUsage() {
    let used = 0;
    keys().forEach(key => {
      const raw = localStorage.getItem(_prefixed(key));
      if (raw) used += raw.length * 2; // 文字 × 2バイト（UTF-16）
    });
    return {
      used,
      usedKB: (used / 1024).toFixed(2),
    };
  }

  // ============================================================
  // 内部ユーティリティ
  // ============================================================

  /**
   * キーにプレフィックスを付与する。
   *
   * @param {string} key
   * @returns {string}
   */
  function _prefixed(key) {
    return PREFIX + key;
  }

  // ============================================================
  // グローバル公開
  // ============================================================

  const SumiokaStorage = { save, load, remove, clear, exists, keys, getUsage };

  global.SumiokaStorage = SumiokaStorage;

  // 省略形（直接呼べる）
  global.storeSave   = save;
  global.storeLoad   = load;
  global.storeRemove = remove;
  global.storeClear  = clear;
  global.storeExists = exists;
  global.storeKeys   = keys;

})(window);

  </script>

      margin-bottom: 1rem;
    }

    .lunch-option {
      flex: 1;
    }

    /* ラジオボタンを非表示にしてカード風UIで代替 */
    .lunch-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .lunch-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem;
      border: 1px solid GrayText;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: border-color 0.15s, background-color 0.15s;
      user-select: none;
    }

    .lunch-option input[type="radio"]:checked + label {
      border-color: Highlight;
      background-color: Highlight;
      color: HighlightText;
    }

    .lunch-option input[type="radio"]:focus-visible + label {
      outline: 2px solid Highlight;
      outline-offset: 2px;
    }

    /* 業務報告 */
    .report-area {
      margin-bottom: 1rem;
    }

    /* 現在時刻ライブ表示 */
    .live-clock {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.25rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    /* 状態テキスト */
    .status-text {
      font-size: 0.85rem;
      color: GrayText;
      text-align: center;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }

    /* バージョン表示（左下固定）
       画面の邪魔にならないよう小さく・薄く表示する */
    .version-badge {
      position: fixed;
      bottom: 0.6rem;
      left: 0.75rem;
      font-size: 0.72rem;
      color: GrayText;
      pointer-events: none; /* クリックを素通りさせる */
      user-select: none;
      z-index: 10;
    }

    /* 定時通知バナー（非表示→表示） */
    .overtime-banner {
      display: none;
      border: 1px solid #b45309;
      border-radius: 6px;
      padding: 0.65rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #b45309;
      font-weight: 600;
      text-align: center;
    }

    .overtime-banner.show {
      display: block;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       ログイン画面
       ============================================================ -->
  <div id="screen-login">
    <div id="screen-main" style="display:none">
    <p class="login-title">住岡 勤怠管理</p>

    <div class="login-card">
      <div class="sumioka-form-group">
        <label class="sumioka-label" for="input-pin">PIN（4桁）</label>
        <input
          class="sumioka-input"
          type="tel"
          id="input-pin"
          maxlength="4"
          inputmode="numeric"
          autocomplete="off"
          placeholder="0000"
        >
      </div>

      <div class="sumioka-form-group">
        <label class="sumioka-label" for="input-password">パスワード</label>
        <input
          class="sumioka-input"
          type="password"
          id="input-password"
          autocomplete="current-password"
          placeholder="パスワードを入力"
        >
      </div>

      <button
        class="sumioka-btn sumioka-btn-primary sumioka-btn-block sumioka-mt-2"
        id="btn-login"
      >
        ログイン
      </button>
    </div>
  </div>

  <!-- ============================================================
       メイン打刻画面
       ============================================================ -->
  <div id="screen-main">

    <!-- ヘッダー -->
    <div class="kintai-header">
      <div>
        <div class="kintai-header-name" id="display-name">――</div>
        <div class="kintai-header-date" id="display-date">――</div>
      </div>
      <button class="kintai-header-logout" id="btn-logout">ログアウト</button>
    </div>

    <!-- 定時通知バナー -->
    <div class="overtime-banner" id="overtime-banner">
      ⏰ まもなく定時です。退勤の準備をしてください。
    </div>

    <!-- 残不足バナー -->
    <div class="balance-banner">
      <span class="balance-banner-label">今月の残不足</span>
      <span class="balance-banner-value" id="display-balance">読み込み中...</span>
    </div>

    <!-- 出勤カード -->
    <div class="kintai-card" id="card-checkin">
      <div class="kintai-card-title">出勤</div>

      <!-- 打刻済みの場合はこちらを表示 -->
      <div id="checkin-stamped" class="sumioka-hidden">
        <div class="stamped-time" id="display-checkin-time">--:--</div>
        <div class="stamped-label">出勤打刻済み</div>
      </div>

      <!-- 未打刻の場合はこちらを表示 -->
      <div id="checkin-form">
        <!-- 現在時刻 -->
        <div class="live-clock" id="live-clock">--:--:--</div>

        <!-- 弁当要否（必須） -->
        <div class="sumioka-form-group">
          <div class="sumioka-label">弁当</div>
          <div class="lunch-options">
            <div class="lunch-option">
              <input type="radio" name="lunch" id="lunch-yes" value="yes">
              <label for="lunch-yes">要</label>
            </div>
            <div class="lunch-option">
              <input type="radio" name="lunch" id="lunch-no" value="no">
              <label for="lunch-no">不要</label>
            </div>
          </div>
        </div>

        <button
          class="sumioka-btn sumioka-btn-primary sumioka-btn-block"
          id="btn-checkin"
          disabled
        >
          出勤打刻
        </button>
        <p class="status-text" id="checkin-status">弁当の要否を選択してください</p>
      </div>
    </div>

    <!-- 退勤カード -->
    <div class="kintai-card" id="card-checkout">
      <div class="kintai-card-title">退勤</div>

      <!-- 打刻済みの場合はこちらを表示 -->
      <div id="checkout-stamped" class="sumioka-hidden">
        <div class="stamped-time" id="display-checkout-time">--:--</div>
        <div class="stamped-label">退勤打刻済み</div>
      </div>

      <!-- 未打刻の場合はこちらを表示 -->
      <div id="checkout-form">

        <!-- 休憩時間（必須）
             15分単位の選択式。未選択では退勤ボタンが押せない。
             Phase 2 で「法定休憩の自動チェック」を追加予定。 -->
        <div class="sumioka-form-group">
          <label class="sumioka-label" for="select-break">休憩時間（必須）</label>
          <select class="sumioka-input" id="select-break">
            <option value="">-- 選択してください --</option>
            <option value="0">0分</option>
            <option value="15">15分</option>
            <option value="30">30分</option>
            <option value="45">45分</option>
            <option value="60">60分</option>
            <option value="75">75分</option>
            <option value="90">90分</option>
            <option value="105">105分</option>
            <option value="120">120分</option>
          </select>
        </div>

        <!-- 業務報告（必須） -->
        <div class="report-area">
          <label class="sumioka-label" for="input-report">業務報告（必須）</label>
          <textarea
            class="sumioka-textarea"
            id="input-report"
            placeholder="本日の業務内容を入力してください"
            rows="3"
          ></textarea>
        </div>

        <button
          class="sumioka-btn sumioka-btn-primary sumioka-btn-block"
          id="btn-checkout"
          disabled
        >
          退勤打刻
        </button>
        <p class="status-text" id="checkout-status">出勤打刻後に入力できます</p>
      </div>
    </div>

  </div><!-- /#screen-main -->

  <!-- バージョン表示（左下固定）
       ｖ1.2.1 はアップロード時に Uploader が実際のバージョン番号に置換する -->
  <div class="version-badge" id="app-version">ｖ1.2.1</div>


  <script>
    'use strict';

    // ============================================================
    // 設定
    // ============================================================

    /**
     * GAS デプロイ URL。
     * URLは変えない運用。変更が必要な場合はこの1行だけ書き換える。
     */
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzr_U7LyysRif0HKFou1pc6x4wGcW2K395JAT0iJr7uFNnX3rRyP8RYawOST-Tjwm2Y8w/exec';

    /**
     * 定時通知を出す分数（定時の何分前に通知するか）。
     * 提案書仕様: 定時5分前。
     */
    const OVERTIME_NOTICE_MINUTES = 5;

    // ============================================================
    // 状態管理
    // ============================================================

    /**
     * アプリの状態を1か所で管理する。
     * 状態が変わるたびに renderState() を呼んで画面を同期する。
     *
     * @type {{
     *   employeeId   : string,
     *   name         : string,
     *   scheduledEnd : string,   // 'HH:MM' 形式の所定終業時刻
     *   checkedIn    : boolean,
     *   checkedOut   : boolean,
     *   checkinTime  : string,   // 'HH:MM' 形式
     *   checkoutTime : string,   // 'HH:MM' 形式
     *   lunch        : boolean|null,
     *   report       : string,
     * }}
     */
    const state = {
      employeeId   : '',
      name         : '',
      scheduledEnd : '',
      checkedIn    : false,
      checkedOut   : false,
      checkinTime  : '',
      checkoutTime : '',
      lunch        : null,
      report       : '',
      breakMinutes : null,   // 休憩時間（分）。null = 未選択。退勤時に必須
    };

    // ============================================================
    // 初期化
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
      // GAS URL をセット
      setGasUrl(GAS_URL);

      // ライブ時計を起動
      startLiveClock();

      // 定時通知チェックを1分ごとに実行
      setInterval(checkOvertimeNotice, 60 * 1000);

      // 保存済みセッションがあれば自動ログイン
      const session = SumiokaStorage.load('kintai_session');
      if (session && session.employeeId) {
        applySession(session);
        loadTodayRecord();
      }

      // イベントリスナーを設定
      bindEvents();

      // 今日の日付をヘッダーに表示
      document.getElementById('display-date').textContent = todayString();
    });

    // ============================================================
    // イベント設定
    // ============================================================

    function bindEvents() {
      // ログイン
      document.getElementById('btn-login').addEventListener('click', handleLogin);

      // PIN・パスワード入力でEnterキーを押したらログイン
      ['input-pin', 'input-password'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
          if (e.key === 'Enter') handleLogin();
        });
      });

      // ログアウト
      document.getElementById('btn-logout').addEventListener('click', handleLogout);

      // 弁当選択 → 出勤ボタンの有効化
      document.querySelectorAll('input[name="lunch"]').forEach(radio => {
        radio.addEventListener('change', () => {
          state.lunch = (radio.value === 'yes');
          renderCheckinButton();
        });
      });

      // 業務報告入力 → 退勤ボタンの有効化
      document.getElementById('input-report').addEventListener('input', e => {
        state.report = e.target.value.trim();
        renderCheckoutButton();
      });

      // 休憩時間選択 → 退勤ボタンの有効化
      // 値は文字列で来るので Number に変換して保持する
      document.getElementById('select-break').addEventListener('change', e => {
        const val = e.target.value;
        state.breakMinutes = val === '' ? null : Number(val);
        renderCheckoutButton();
      });

      // 出勤打刻
      document.getElementById('btn-checkin').addEventListener('click', handleCheckin);

      // 退勤打刻
      document.getElementById('btn-checkout').addEventListener('click', handleCheckout);
    }

    // ============================================================
    // 認証
    // ============================================================

    /**
     * ログイン処理。
     * PIN + パスワードを GAS に送って照合する。
     * 成功したらセッションを localStorage に保存して打刻画面へ。
     */
    async function handleLogin() {
      const pin      = document.getElementById('input-pin').value.trim();
      const password = document.getElementById('input-password').value.trim();
      const btn      = document.getElementById('btn-login');

      if (!pin || !password) {
        showToast('PIN とパスワードを入力してください。', 'warning');
        return;
      }

      showLoading('認証中...');

      const result = await callGAS('authenticate', { pin, password }, { button: btn });

      hideLoading();

      if (!result.success) {
        showError(result.error_message, result.error_detail);
        return;
      }

      const { employee } = result.data;

      // セッションを保存（次回起動時に自動ログイン）
      SumiokaStorage.save('kintai_session', {
        employeeId   : employee.id,
        name         : employee.name,
        scheduledEnd : employee.data?.scheduled_end || '',
      });

      applySession({
        employeeId   : employee.id,
        name         : employee.name,
        scheduledEnd : employee.data?.scheduled_end || '',
      });

      await loadTodayRecord();
    }

    /**
     * セッション情報を state に適用して打刻画面へ切り替える。
     *
     * @param {{ employeeId: string, name: string, scheduledEnd: string }} session
     */
    function applySession(session) {
      state.employeeId   = session.employeeId;
      state.name         = session.name;
      state.scheduledEnd = session.scheduledEnd;

      document.getElementById('display-name').textContent = session.name;
      showScreen('main');
    }

    /**
     * ログアウト処理。
     * セッションを削除してログイン画面へ戻る。
     */
    async function handleLogout() {
      const ok = await confirm('ログアウトしますか？');
      if (!ok) return;

      SumiokaStorage.remove('kintai_session');

      // 状態をリセット
      Object.assign(state, {
        employeeId: '', name: '', scheduledEnd: '',
        checkedIn: false, checkedOut: false,
        checkinTime: '', checkoutTime: '',
        lunch: null, report: '', breakMinutes: null,
      });

      // フォームをリセット
      document.querySelectorAll('input[name="lunch"]').forEach(r => r.checked = false);
      document.getElementById('input-report').value = '';
      document.getElementById('select-break').value = '';  // 休憩時間セレクトをリセット
      document.getElementById('input-pin').value = '';
      document.getElementById('input-password').value = '';

      showScreen('login');
    }

    // ============================================================
    // 今日のレコード読み込み
    // ============================================================

    /**
     * 今日の出退勤レコードを GAS から取得して状態を復元する。
     * 画面を開き直したときに打刻済み状態を正しく表示するために使う。
     */
    async function loadTodayRecord() {
      showLoading('データを読み込み中...');

      const today  = todayString();
      const result = await callGAS('load', {
        employee_id : state.employeeId,
        date        : today,
      });

      hideLoading();

      if (!result.success) {
        // 取得失敗はトースト通知のみ（致命的エラーではない）
        showToast('データの読み込みに失敗しました。', 'error');
        renderState();
        return;
      }

      const record = result.data.record;

      if (record && record.data) {
        const d = record.data;

        // 出勤済みの場合
        if (d.time_in) {
          state.checkedIn   = true;
          state.checkinTime = d.time_in;
          state.lunch       = d.lunch ?? null;
        }

        // 退勤済みの場合
        if (d.time_out) {
          state.checkedOut   = true;
          state.checkoutTime = d.time_out;
          state.report       = d.memo || '';
          // 保存済みの休憩時間を復元する（画面を開き直したときに正しく表示するため）
          state.breakMinutes = typeof d.break_minutes === 'number' ? d.break_minutes : null;
        }
      }

      // 残不足時間を読み込む
      await loadBalance();

      renderState();
    }

    /**
     * 今月の残不足時間を取得してバナーに表示する。
     */
    async function loadBalance() {
      const yearMonth = todayString().slice(0, 7); // 'YYYY-MM'

      const result = await callGAS('monthly_report', {
        year_month: yearMonth,
      });

      if (!result.success) return;

      // 自分のサマリーを探す
      const summary = result.data.report?.find(r => r.employee_id === state.employeeId);

      if (!summary) {
        document.getElementById('display-balance').textContent = '―';
        return;
      }

      // 残不足 = 合計勤務時間 - 所定労働時間合計（簡易計算）
      // ※ 正確な計算は Phase 3（給与計算）で実装
      const totalMin    = summary.total_work_minutes || 0;
      const workDays    = summary.work_days || 0;
      const scheduledMin = workDays * 8 * 60; // 暫定: 1日8時間
      const diffMin     = totalMin - scheduledMin;

      const el = document.getElementById('display-balance');
      el.textContent = formatMinutes(diffMin, true);
      el.className   = 'balance-banner-value ' + (diffMin >= 0 ? 'over' : 'short');
    }

    // ============================================================
    // 出勤打刻
    // ============================================================

    /**
     * 出勤打刻処理。
     * 弁当要否を確認してから GAS に送信する。
     */
    async function handleCheckin() {
      if (state.lunch === null) {
        showToast('弁当の要否を選択してください。', 'warning');
        return;
      }

      const ok = await confirm(`出勤打刻をしますか？\n弁当：${state.lunch ? '要' : '不要'}`);
      if (!ok) return;

      const now = nowTimeString();
      const btn = document.getElementById('btn-checkin');

      showLoading('出勤打刻中...');

      const result = await callGAS('save', {
        employee_id     : state.employeeId,
        date            : todayString(),
        attendance_data : {
          status  : '出勤',
          time_in : now,
          lunch   : state.lunch,
        },
      }, { button: btn });

      hideLoading();

      if (!result.success) {
        showError(result.error_message, result.error_detail, handleCheckin);
        return;
      }

      state.checkedIn   = true;
      state.checkinTime = now;

      showToast('出勤打刻しました。', 'success');
      renderState();
    }

    // ============================================================
    // 退勤打刻
    // ============================================================

    /**
     * 退勤打刻処理。
     * 業務報告を確認してから GAS に送信する。
     * 出勤時のデータを引き継いで upsert する。
     */
    async function handleCheckout() {
      if (!state.report) {
        showToast('業務報告を入力してください。', 'warning');
        return;
      }

      const ok = await confirm('退勤打刻をしますか？');
      if (!ok) return;

      const now = nowTimeString();
      const btn = document.getElementById('btn-checkout');

      // 勤務時間を計算（分）
      const workMin = calcWorkMinutes(state.checkinTime, now);

      showLoading('退勤打刻中...');

      const result = await callGAS('save', {
        employee_id     : state.employeeId,
        date            : todayString(),
        attendance_data : {
          status        : state.checkinTime ? deriveStatus() : '出勤',
          time_in       : state.checkinTime,
          time_out      : now,
          break_minutes : state.breakMinutes,   // ユーザーが選択した休憩時間（分）
          work_minutes  : Math.max(0, workMin - state.breakMinutes),
          lunch         : state.lunch ?? false,
          memo          : state.report,
        },
      }, { button: btn });

      hideLoading();

      if (!result.success) {
        showError(result.error_message, result.error_detail, handleCheckout);
        return;
      }

      state.checkedOut   = true;
      state.checkoutTime = now;

      showToast('退勤打刻しました。お疲れ様でした。', 'success');
      renderState();
    }

    /**
     * 出勤時刻と現在時刻から status を導出する。
     * 所定開始時刻（9:00 固定、Phase 2 で設定可能にする）と比較して遅刻判定。
     *
     * @returns {'出勤'|'遅刻'|'早退'}
     */
    function deriveStatus() {
      // 暫定: 9:00 を所定開始時刻とする
      const scheduledStart = '09:00';
      if (state.checkinTime > scheduledStart) return '遅刻';
      if (state.scheduledEnd && state.checkoutTime < state.scheduledEnd) return '早退';
      return '出勤';
    }

    // ============================================================
    // 画面描画
    // ============================================================

    /**
     * state を見て画面全体を同期する。
     * 状態が変わるたびにこの関数を呼ぶ。
     */
    function renderState() {
      renderCheckinArea();
      renderCheckoutArea();
      renderCheckinButton();
      renderCheckoutButton();
      checkOvertimeNotice();
    }

    /**
     * 出勤エリアの表示を更新する。
     */
    function renderCheckinArea() {
      const stamped = document.getElementById('checkin-stamped');
      const form    = document.getElementById('checkin-form');

      if (state.checkedIn) {
        stamped.classList.remove('sumioka-hidden');
        form.classList.add('sumioka-hidden');
        document.getElementById('display-checkin-time').textContent = state.checkinTime;
      } else {
        stamped.classList.add('sumioka-hidden');
        form.classList.remove('sumioka-hidden');
      }
    }

    /**
     * 退勤エリアの表示を更新する。
     */
    function renderCheckoutArea() {
      const stamped = document.getElementById('checkout-stamped');
      const form    = document.getElementById('checkout-form');

      if (state.checkedOut) {
        stamped.classList.remove('sumioka-hidden');
        form.classList.add('sumioka-hidden');
        document.getElementById('display-checkout-time').textContent = state.checkoutTime;
      } else {
        stamped.classList.add('sumioka-hidden');
        form.classList.remove('sumioka-hidden');
      }
    }

    /**
     * 出勤ボタンの有効・無効と状態テキストを更新する。
     */
    function renderCheckinButton() {
      const btn    = document.getElementById('btn-checkin');
      const status = document.getElementById('checkin-status');

      if (state.checkedIn) return;

      if (state.lunch === null) {
        btn.disabled    = true;
        status.textContent = '弁当の要否を選択してください';
      } else {
        btn.disabled    = false;
        status.textContent = '';
      }
    }

    /**
     * 退勤ボタンの有効・無効と状態テキストを更新する。
     */
    function renderCheckoutButton() {
      const btn    = document.getElementById('btn-checkout');
      const status = document.getElementById('checkout-status');

      if (state.checkedOut) return;

      if (!state.checkedIn) {
        btn.disabled       = true;
        status.textContent = '出勤打刻後に入力できます';
      } else if (state.breakMinutes === null) {
        // 休憩時間が未選択の場合は退勤不可
        btn.disabled       = true;
        status.textContent = '休憩時間を選択してください';
      } else if (!state.report) {
        btn.disabled       = true;
        status.textContent = '業務報告を入力してください';
      } else {
        btn.disabled       = false;
        status.textContent = '';
      }
    }

    /**
     * ログイン画面 / メイン画面を切り替える。
     *
     * @param {'login'|'main'} screen
     */
function showScreen(screen) {
  const login = document.getElementById('screen-login');
  const main  = document.getElementById('screen-main');

  // 一旦全部非表示
  login.style.display = 'none';
  main.style.display  = 'none';

  // 指定画面だけ表示
  if (screen === 'login') {
    login.style.display = 'block';
  }

  if (screen === 'main') {
    main.style.display = 'block';
  }
}

    // ============================================================
    // ライブ時計
    // ============================================================

    /**
     * ライブ時計を1秒ごとに更新する。
     * 出勤済みの場合は非表示のため更新不要だが、処理コストが低いためそのまま動かす。
     */
    function startLiveClock() {
      function tick() {
        const now = new Date();
        const h   = String(now.getHours()).padStart(2, '0');
        const m   = String(now.getMinutes()).padStart(2, '0');
        const s   = String(now.getSeconds()).padStart(2, '0');
        const el  = document.getElementById('live-clock');
        if (el) el.textContent = `${h}:${m}:${s}`;
      }
      tick();
      setInterval(tick, 1000);
    }

    // ============================================================
    // 定時通知
    // ============================================================

    /**
     * 定時5分前かどうかを確認し、該当したらバナーを表示する。
     * 出勤済み・退勤未済・scheduledEnd が設定されている場合のみ動作する。
     */
    function checkOvertimeNotice() {
      const banner = document.getElementById('overtime-banner');

      if (!state.checkedIn || state.checkedOut || !state.scheduledEnd) {
        banner.classList.remove('show');
        return;
      }

      const now     = nowTimeString(); // 'HH:MM'
      const noticeTime = subtractMinutes(state.scheduledEnd, OVERTIME_NOTICE_MINUTES);

      // 通知時刻を過ぎていて、定時を過ぎていなければバナーを表示
      if (now >= noticeTime && now < state.scheduledEnd) {
        banner.classList.add('show');
      } else {
        banner.classList.remove('show');
      }
    }

    // ============================================================
    // ユーティリティ
    // ============================================================

    /**
     * 今日の日付を 'YYYY-MM-DD' 形式で返す。
     *
     * @returns {string}
     */
    function todayString() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    /**
     * 現在時刻を 'HH:MM' 形式で返す。
     *
     * @returns {string}
     */
    function nowTimeString() {
      const d = new Date();
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    /**
     * 出勤時刻と退勤時刻から勤務時間（分）を計算する。
     *
     * @param {string} timeIn  - 'HH:MM'
     * @param {string} timeOut - 'HH:MM'
     * @returns {number} 分
     */
    function calcWorkMinutes(timeIn, timeOut) {
      const [ih, im] = timeIn.split(':').map(Number);
      const [oh, om] = timeOut.split(':').map(Number);
      return (oh * 60 + om) - (ih * 60 + im);
    }

    /**
     * 'HH:MM' 形式の時刻から指定分数を引いた時刻を返す。
     *
     * @param {string} time - 'HH:MM'
     * @param {number} minutes
     * @returns {string} 'HH:MM'
     */
    function subtractMinutes(time, minutes) {
      const [h, m] = time.split(':').map(Number);
      const total  = h * 60 + m - minutes;
      const rh     = Math.floor(total / 60);
      const rm     = total % 60;
      return `${String(rh).padStart(2, '0')}:${String(rm).padStart(2, '0')}`;
    }

    /**
     * 分数を 'H時間M分' 形式にフォーマットする。
     *
     * @param {number}  minutes
     * @param {boolean} [showSign=false] - 符号（+/-）を付けるか
     * @returns {string}
     */
    function formatMinutes(minutes, showSign = false) {
      const abs  = Math.abs(minutes);
      const h    = Math.floor(abs / 60);
      const m    = abs % 60;
      const sign = showSign ? (minutes >= 0 ? '+' : '-') : '';
      return `${sign}${h}時間${m}分`;
    }
  </script>
